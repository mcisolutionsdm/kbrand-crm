      <button class="vb" id="vbk" onclick="setV('kanban')"><i class="ti ti-layout-columns"></i>Kanban</button>

    </div>
  </div>
  <div id="np" class="panel" style="display:none">
    <div class="ptitle"><i class="ti ti-file-plus"></i>Nuova offerta</div>
    <div class="fg">
      <div class="ff"><label>Cliente<span class="req">*</span></label><input type="text" id="nc" placeholder="Es. AutoZeta"><div class="ferr" id="ne">Campo obbligatorio</div></div>
      <div class="ff"><label>Attivita</label><input type="text" id="na" list="atl" placeholder="Scegli o digita..."></div>
      <div class="ff"><label>Stato</label><select id="ns"><option value="bozza">Da inviare</option><option value="INVIATA">Inviata</option><option value="Firmata">Firmata</option><option value="Persa">Persa</option></select></div>

      <div class="ff"><label>Data ricontatto</label><input type="date" id="nr"></div>
      <div class="ff"><label>Tipo agenda</label><select id="nk"><option value="">nessuna</option><option value="Outlook">Outlook 365</option><option value="Google">Google Calendar</option></select></div>
      <div class="ff fw"><label>Link proposta</label><input type="text" id="nl" placeholder="https://..."></div>
    </div>
    <div class="pa">
      <button class="bcn" onclick="closeP('np')">Annulla</button>
      <button class="bsv" onclick="saveNew()"><i class="ti ti-check" style="font-size:13px;margin-right:5px;vertical-align:-1px"></i>Salva offerta</button>
    </div>
  </div>
  <datalist id="atl"></datalist>
  <div id="va"></div>
</div>
</div>

    inv:  d.inv || d.inviata || null,
    ric:  d.ric || d.ricontatto || null,
    cal:  d.cal || d.tipo_cal || d.k || null,
    lnk:  d.lnk || d.link || d.l || null
  };
}
function start(){
  try{
    firebase.initializeApp(CFG);
    db=firebase.database();
    useFB=true;
    show(true);
    db.ref(FP).on("value",function(sn){
      var d=sn.val()||{};
      var raw=arr(d.deals)||arr(d.offerte);deals=raw?raw.map(norm):cl(DD);
      acts=arr(d.activities)||arr(d.acts)||DA.slice();
      render();
    });
  }catch(e){
    console.warn("FB:",e);
    local();
  }
}
function arr(v){if(!v)return null;return Array.isArray(v)?v:Object.values(v);}
function show(on){
  document.getElementById("app").style.display="block";
  var el=document.getElementById("cb");
  el.className="cloud-badge "+(on?"cloud-on":"cloud-off");
  el.innerHTML=on?"<i class='ti ti-cloud' style='font-size:12px'></i> Cloud attivo":"<i class='ti ti-cloud-off' style='font-size:12px'></i> Locale";
}
function local(){
  try{var r=localStorage.getItem(SK);var raw=r?JSON.parse(r):null;deals=raw?raw.map(norm):cl(DD);}catch(e){deals=cl(DD);}
  try{var r2=localStorage.getItem(SA);acts=r2?JSON.parse(r2):DA.slice();}catch(e){acts=DA.slice();}
  show(false);render();
}
function save(){
  if(useFB&&db){db.ref(FP+"/deals").set(deals);db.ref(FP+"/activities").set(acts);}
  else{try{localStorage.setItem(SK,JSON.stringify(deals));localStorage.setItem(SA,JSON.stringify(acts));}catch(e){}}
  var t=new Date();
  document.getElementById("ls").textContent=(useFB?"Sync ":"Salvato ")+("0"+t.getHours()).slice(-2)+":"+("0"+t.getMinutes()).slice(-2);
}
function render(){rdl();rch();metrics();go();}

function rdl(){var dl=document.getElementById("atl");if(!dl)return;dl.innerHTML=acts.map(function(a){return"<option value='"+esc(a)+"'>";}).join("");}
function rch(){
  var el=document.getElementById("ach");if(!el)return;
  el.innerHTML=acts.length?acts.map(function(a,i){return"<span class='ac'>"+esc(a)+"<button data-ri='"+i+"'><i class='ti ti-x'></i></button></span>";}).join(""):"<span style='font-size:12px;color:#bbb'>Nessuna attivita</span>";
}
function addAtt(){var inp=document.getElementById("ani"),v=inp.value.trim().toUpperCase();if(!v||acts.indexOf(v)>=0){inp.value="";return;}acts.push(v);inp.value="";save();rdl();rch();}
function autoAtt(v){var u=v.trim().toUpperCase();if(u&&acts.indexOf(u)<0){acts.push(u);rdl();}}

function toggleP(id){
  var el=document.getElementById(id),ot=id==="np"?"ap":"np";
  document.getElementById(ot).style.display="none";
  if(el.style.display==="none"){
    el.style.display="block";
    if(id==="np"){["nc","na","ni","nr","nl"].forEach(function(x){document.getElementById(x).value="";});document.getElementById("ns").value="bozza";document.getElementById("nk").value="";document.getElementById("ne").style.display="none";setTimeout(function(){document.getElementById("nc").focus();},50);}
    if(id==="ap"){rch();setTimeout(function(){document.getElementById("ani").focus();},50);}
  }else{el.style.display="none";}
}
function closeP(id){document.getElementById(id).style.display="none";}

function saveNew(){
  var c=document.getElementById("nc").value.trim();
  if(!c){document.getElementById("ne").style.display="block";return;}
  var a=document.getElementById("na").value.trim();
  autoAtt(a);
  deals.push({id:uid(),c:c,a:a||"-",stato:document.getElementById("ns").value,inv:document.getElementById("ni").value||null,ric:document.getElementById("nr").value||null,cal:document.getElementById("nk").value||null,lnk:document.getElementById("nl").value.trim()||null});
  save();metrics();closeP("np");if(!useFB)go();
}
function startEdit(id){eid=id;go();}
function cancelEdit(){eid=null;go();}
function saveEdit(id){
  var d=gid(id);if(!d)return;
  var el=document.getElementById("ec"+id);if(!el)return;
  var c=el.value.trim();
  if(!c){el.classList.add("err");el.focus();return;}
  el.classList.remove("err");
  var a=document.getElementById("ea"+id).value.trim();
  autoAtt(a);
  d.c=c;d.a=a||"-";
  d.s=document.getElementById("es"+id).value;
  d.v=document.getElementById("ev"+id).value||null;
  d.r=document.getElementById("er"+id).value||null;
  d.k=document.getElementById("ek"+id).value||null;
  d.l=document.getElementById("el"+id).value.trim()||null;
  eid=null;save();metrics();if(!useFB)go();
}
function delDeal(id){
  if(!confirm("Eliminare questa offerta?"))return;
  deals=deals.filter(function(d){return d.id!==id;});save();metrics();if(!useFB)go();
}
function openAg(id){
  var d=gid(id);if(!d||!d.r)return;
  var s=encodeURIComponent("Ricontatto "+d.c+" - "+d.a);
  var b=encodeURIComponent("Offerta: "+d.a+" | Cliente: "+d.c);
  var url;
  if(d.k==="Google"){var dt=d.r.replace(/-/g,"");url="https://calendar.google.com/calendar/render?action=TEMPLATE&text="+s+"&dates="+dt+"T090000/"+dt+"T100000&details="+b;}
  else{url="https://outlook.office.com/calendar/action/compose?subject="+s+"&startdt="+d.r+"T09:00:00&enddt="+d.r+"T10:00:00&body="+b;}
  window.open(url,"_blank");
}

/* ---- evento delegato su #va: gestisce tutti i click su pulsanti dinamici ---- */
document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("va").addEventListener("click",function(e){
    var t=e.target.closest ? e.target.closest("[data-a]") : null;
    if(!t)return;
    var id=t.getAttribute("data-id");
    switch(t.getAttribute("data-a")){
      case "edit":   startEdit(id); break;
      case "del":    delDeal(id);   break;
      case "ag":     openAg(id);    break;
      case "save":   saveEdit(id);  break;
      case "cancel": cancelEdit();  break;
    }
  });
  document.getElementById("ach").addEventListener("click",function(e){
    var btn=e.target.closest("[data-ri]");
    if(!btn)return;
    var i=parseInt(btn.getAttribute("data-ri"),10);
    acts.splice(i,1);save();rdl();rch();
  });
  start();
});

function bdg(s){var m={INVIATA:["bi","ti-send","Inviata"],Firmata:["bf","ti-circle-check","Firmata"],Persa:["bp","ti-circle-x","Persa"],bozza:["bb","ti-clock","Da inviare"]};var r=m[s];return"<span class='badge "+r[0]+"'><i class='ti "+r[1]+"' style='font-size:10px;vertical-align:-1px;margin-right:2px'></i>"+r[2]+"</span>";}
function sO(c){return[["bozza","Da inviare"],["INVIATA","Inviata"],["Firmata","Firmata"],["Persa","Persa"]].map(function(o){return"<option value='"+o[0]+"'"+(c===o[0]?" selected":"")+">"+o[1]+"</option>";}).join("");}
function kO(c,cp){var o=cp?[["","--"],["Outlook","Outlook"],["Google","Google"]]:[["","nessuna"],["Outlook","Outlook 365"],["Google","Google Calendar"]];return o.map(function(x){return"<option value='"+x[0]+"'"+(c===x[0]?" selected":"")+">"+x[1]+"</option>";}).join("");}

function cV(d){
  var ha=d.ric&&d.cal,al=d.cal==="Google"?"Google Cal":"Outlook";
  return "<div class='card' id='card-"+d.id+"'>"+
    "<div class='acc' style='background:"+AC[d.stato]+"'></div>"+
    "<div class='ch'><div class='cn'>"+esc(d.c)+"</div>"+
    "<div class='ca'>"+bdg(d.stato)+
    " <button class='eb' data-a='edit' data-id='"+d.id+"'><i class='ti ti-edit' style='font-size:12px'></i>Modifica</button>"+
    " <button class='db' data-a='del' data-id='"+d.id+"' title='Elimina'><i class='ti ti-trash'></i></button>"+
    "</div></div>"+
    "<div class='at'><i class='ti ti-tag' style='font-size:10px'></i>"+esc(d.a)+"</div>"+
    "<div class='mr'>"+(d.inv?"<i class='ti ti-calendar-event'></i>Inviata il "+fmt(d.inv):"<i class='ti ti-calendar-off'></i><span style='color:#ccc'>Data invio non impostata</span>")+"</div>"+
    (d.ric?"<div class='mr ri'><i class='ti ti-bell'></i>Ricontatto "+fmt(d.ric)+"</div>":"")+
    ((ha||d.lnk)?"<div class='cf'>"+
      (ha?" <button class='fb ag' data-a='ag' data-id='"+d.id+"'><i class='ti ti-calendar-event' style='font-size:11px'></i>"+al+"</button>":"")+
      (d.lnk?"<a class='fb pr' href='"+esc(d.lnk)+"' target='_blank' rel='noopener'><i class='ti ti-external-link' style='font-size:11px'></i>Apri proposta</a>":"")+
      "</div>":"")+
    "</div>";
}
function cE(d){
  var id=d.id;
  return "<div class='card editing' id='card-"+id+"'>"+
    "<div class='acc' style='background:"+AC[d.stato]+"'></div>"+
    "<div class='et'><i class='ti ti-edit'></i> Modifica offerta</div>"+
    "<div class='eg'>"+
    "<div class='ef'><label>Cliente *</label><input id='ec"+id+"' value='"+esc(d.c)+"'></div>"+
    "<div class='ef'><label>Attivita</label><input id='ea"+id+"' value='"+esc(d.a)+"' list='atl'></div>"+
    "<div class='ef'><label>Stato</label><select id='es"+id+"'>"+sO(d.stato)+"</select></div>"+
    "<div class='ef'><label>Tipo agenda</label><select id='ek"+id+"'>"+kO(d.k,false)+"</select></div>"+
    "<div class='ef'><label>Data invio</label><input type='date' id='ev"+id+"' value='"+(d.inv||"")+"'></div>"+
    "<div class='ef'><label>Data ricontatto</label><input type='date' id='er"+id+"' value='"+(d.ric||"")+"'></div>"+
    "<div class='ef fw'><label>Link proposta</label><input id='el"+id+"' value='"+esc(d.lnk||"")+"' placeholder='https://...'></div>"+
    "</div>"+
    "<div class='efo'>"+
    "<button class='ecn' data-a='cancel'>Annulla</button>"+
    "<button class='esv' data-a='save' data-id='"+id+"'><i class='ti ti-check' style='font-size:12px;margin-right:4px;vertical-align:-1px'></i>Salva</button>"+
    "</div></div>";
}
function kV(d){
  var ha=d.ric&&d.cal,al=d.cal==="Google"?"Google":"Outlook";
  return "<div class='kcard' id='kcard-"+d.id+"'>"+
    "<div class='acc' style='background:"+AC[d.stato]+"'></div>"+
    "<div class='kac'>"+
    "<button class='ke' data-a='edit' data-id='"+d.id+"'><i class='ti ti-edit' style='font-size:10px'></i>Modifica</button>"+
    "<button class='kd' data-a='del' data-id='"+d.id+"' title='Elimina'><i class='ti ti-trash'></i></button>"+
    "</div>"+
    "<div class='kn'>"+esc(d.c)+"</div><div class='kt'>"+esc(d.a)+"</div>"+
    (d.inv?"<div class='km'><i class='ti ti-calendar-event'></i>"+fmt(d.inv)+"</div>":"")+
    (d.ric?"<div class='km ri'><i class='ti ti-bell'></i>"+fmt(d.ric)+"</div>":"")+
    ((ha||d.lnk)?"<div class='kfo'>"+
      (ha?"<button class='kfb ka' data-a='ag' data-id='"+d.id+"'><i class='ti ti-calendar-event'></i>"+al+"</button>":"")+
      (d.lnk?"<a class='kfb kp' href='"+esc(d.lnk)+"' target='_blank' rel='noopener'><i class='ti ti-external-link'></i>Proposta</a>":"")+
      "</div>":"")+
    "</div>";
}
function kE(d){
  var id=d.id;
  return "<div class='kcard editing' id='kcard-"+id+"'>"+
    "<div class='acc' style='background:"+AC[d.stato]+"'></div>"+
    "<div style='font-size:9px;font-weight:700;color:#2B5F9E;text-transform:uppercase;margin-bottom:8px'>Modifica</div>"+
    "<div class='keg'>"+
    "<div class='kef fw'><label>Cliente *</label><input id='ec"+id+"' value='"+esc(d.c)+"'></div>"+
    "<div class='kef fw'><label>Attivita</label><input id='ea"+id+"' value='"+esc(d.a)+"' list='atl'></div>"+
    "<div class='kef'><label>Stato</label><select id='es"+id+"'>"+sO(d.stato)+"</select></div>"+
    "<div class='kef'><label>Agenda</label><select id='ek"+id+"'>"+kO(d.k,true)+"</select></div>"+
    "<div class='kef'><label>Data invio</label><input type='date' id='ev"+id+"' value='"+(d.v||"")+"'></div>"+
    "<div class='kef'><label>Ricontatto</label><input type='date' id='er"+id+"' value='"+(d.r||"")+"'></div>"+
    "<div class='kef fw'><label>Link proposta</label><input id='el"+id+"' value='"+esc(d.l||"")+"' placeholder='https://...'></div>"+
    "</div>"+
    "<div class='kefo'>"+
    "<button class='kcn' data-a='cancel'>Annulla</button>"+
    "<button class='ksv' data-a='save' data-id='"+id+"'>Salva</button>"+
    "</div></div>";
}

function filtered(){
  var q=document.getElementById("si").value.trim().toLowerCase();
  var srt=document.getElementById("ss").value;
  var L=q?deals.filter(function(d){return d.c.toLowerCase().indexOf(q)>=0||d.a.toLowerCase().indexOf(q)>=0;}):deals.slice();
  if(srt==="dd")L.sort(function(a,b){return pd(b.v)-pd(a.v);});
  else if(srt==="da")L.sort(function(a,b){if(!a.v&&!b.v)return 0;if(!a.v)return 1;if(!b.v)return-1;return pd(a.v)-pd(b.v);});
  else if(srt==="az")L.sort(function(a,b){return a.c.localeCompare(b.c);});
  else if(srt==="za")L.sort(function(a,b){return b.c.localeCompare(a.c);});
  return L;
}
function metrics(){
  document.getElementById("m0").textContent=deals.length;
  document.getElementById("m1").textContent=deals.filter(function(d){return d.stato==="INVIATA";}).length;
  document.getElementById("m2").textContent=deals.filter(function(d){return d.stato==="Firmata";}).length;
  document.getElementById("m3").textContent=deals.filter(function(d){return d.stato==="Persa";}).length;
  document.getElementById("m4").textContent=deals.filter(function(d){return d.stato==="bozza";}).length;
}
function go(){
  var L=filtered();
  var va=document.getElementById("va");
  if(!va)return;
  if(!L.length){va.innerHTML="<div class='nores'><i class='ti ti-search-off' style='font-size:28px;display:block;margin:0 auto 10px;color:#ccc'></i>Nessun risultato.</div>";return;}
  if(view==="card"){va.innerHTML="<div class='cgrid'>"+L.map(function(d){return eid===d.id?cE(d):cV(d);}).join("")+"</div>";}
  else{
    var COLS=[{s:"bozza",l:"Da inviare",ic:"ti-clock"},{s:"INVIATA",l:"Inviate",ic:"ti-send"},{s:"Firmata",l:"Firmate",ic:"ti-circle-check"},{s:"Persa",l:"Perse",ic:"ti-circle-x"}];
    va.innerHTML="<div class='kanban'>"+COLS.map(function(col){
      var items=L.filter(function(d){return d.stato===col.s;});
      return "<div class='kcol'><div class='kch'><i class='ti "+col.ic+"' style='font-size:13px;color:"+AC[col.s]+"'></i><span class='kct'>"+col.l+"</span><span class='kcc'>"+items.length+"</span></div>"+
        (items.length?items.map(function(d){return eid===d.id?kE(d):kV(d);}).join(""):"<div class='kempty'>Nessuna offerta</div>")+
        "</div>";
    }).join("")+"</div>";
  }
  if(eid){var el=document.getElementById("card-"+eid)||document.getElementById("kcard-"+eid);if(el){el.scrollIntoView({behavior:"smooth",block:"nearest"});var inp=el.querySelector("input[id^='ec']");if(inp)setTimeout(function(){inp.focus();},60);}}
}
function setV(v){view=v;eid=null;document.getElementById("vbc").classList.toggle("on",v==="card");document.getElementById("vbk").classList.toggle("on",v==="kanban");go();}
</script>
</body>
</html>
