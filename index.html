<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>kbrand CRM</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f0f4f9;color:#1a1a1a;}
/* layout */
#app{display:none;}
.wrap{max-width:1120px;margin:0 auto;padding:24px 20px;}
/* header */
.hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.logo{font-size:22px;font-weight:700;color:#1E3A5F;letter-spacing:-.5px;}
.logo b{color:#2B5F9E;font-weight:700;}
.sub{font-size:12px;color:#888;margin-top:3px;}
.hr{display:flex;align-items:center;gap:10px;margin-top:6px;}
.stamp{font-size:11px;color:#aaa;}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;}
.b-on{background:#C6EFCE;color:#276221;}
.b-off{background:#FFEB9C;color:#9C6500;}
/* metriche */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.met{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e0e7f0;}
.met-l{font-size:10px;color:#999;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.met-v{font-size:24px;font-weight:700;}
.c0{color:#1E3A5F;}.c1{color:#1F4E79;}.c2{color:#276221;}.c3{color:#9C0006;}.c4{color:#777;}
/* toolbar */
.tb{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.srch{position:relative;flex:1;min-width:170px;}
.srch i{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:#bbb;pointer-events:none;}
input,select,button{font-family:Arial,sans-serif;}
.srch input{width:100%;padding:8px 11px 8px 32px;border:1px solid #dde3ed;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;}
select.sort{padding:8px 11px;border:1px solid #dde3ed;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;cursor:pointer;}
.vtog{display:flex;border:1px solid #dde3ed;border-radius:8px;overflow:hidden;}
.vb{padding:8px 13px;font-size:13px;cursor:pointer;border:none;background:#fff;color:#777;display:flex;align-items:center;gap:4px;}
.vb.on{background:#1E3A5F;color:#fff;}
.vb+.vb{border-left:1px solid #dde3ed;}
.btn-sec{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #dde3ed;border-radius:8px;background:#fff;color:#555;}
.btn-sec:hover{background:#f5f8fc;}
.btn-pri{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;border:none;border-radius:8px;background:#1E3A5F;color:#fff;}
.btn-pri:hover{background:#2B5F9E;}
/* pannelli */
.panel{background:#fff;border:1px solid #dde3ed;border-radius:12px;padding:20px;margin-bottom:14px;}
.ptit{font-size:14px;font-weight:700;color:#1E3A5F;margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.full{grid-column:1/-1;}
.fl label{display:block;font-size:10px;color:#888;margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.fl input,.fl select{width:100%;border:1px solid #dde3ed;border-radius:7px;font-size:13px;background:#fff;color:#1a1a1a;padding:7px 10px;}
.fl input:focus,.fl select:focus{outline:2px solid #2B5F9E;border-color:#2B5F9E;}
.req{color:#c00;}
.err-msg{color:#c00;font-size:11px;margin-top:2px;display:none;}
.pact{display:flex;gap:8px;justify-content:flex-end;padding-top:12px;border-top:1px solid #eee;}
.btn-save{padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;border:none;border-radius:8px;background:#1E3A5F;color:#fff;}
.btn-save:hover{background:#2B5F9E;}
.btn-can{padding:8px 14px;font-size:13px;cursor:pointer;border:1px solid #dde3ed;border-radius:8px;background:#fff;color:#777;}
/* attivita */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:36px;}
.chip{display:inline-flex;align-items:center;gap:6px;background:#f0f4fa;border:1px solid #dde3ed;border-radius:20px;padding:5px 12px;font-size:12px;color:#333;font-weight:600;}
.chip-del{background:none;border:none;cursor:pointer;color:#bbb;font-size:13px;line-height:1;padding:0;display:flex;align-items:center;}
.chip-del:hover{color:#c00;}
.att-row{display:flex;gap:8px;}
.att-row input{flex:1;border:1px solid #dde3ed;border-radius:8px;font-size:13px;padding:7px 10px;background:#fff;color:#1a1a1a;}
.att-row input:focus{outline:2px solid #2B5F9E;}
.att-add{padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;border:none;border-radius:8px;background:#2B5F9E;color:#fff;}
/* card view */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.card{background:#fff;border:1px solid #e0e7f0;border-radius:12px;padding:14px 16px 14px 20px;position:relative;}
.card:hover{border-color:#a8c4e8;box-shadow:0 3px 12px rgba(43,95,158,.1);}
.acc{width:4px;position:absolute;left:0;top:12px;bottom:12px;border-radius:2px;}
.card-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.card-n{font-size:13px;font-weight:700;color:#1E3A5F;line-height:1.3;flex:1;padding-right:8px;}
.card-a{display:flex;gap:4px;flex-shrink:0;}
.btn-mod{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #dde3ed;border-radius:6px;background:#f5f8fc;color:#444;}
.btn-mod:hover{background:#e8eef8;color:#1E3A5F;}
.btn-del{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:1px solid #dde3ed;background:#fff;cursor:pointer;border-radius:6px;color:#ccc;font-size:14px;}
.btn-del:hover{background:#fff0f0;color:#c00;}
.stbadge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;white-space:nowrap;}
.s-inv{background:#BDD7EE;color:#1F4E79;}
.s-fir{background:#C6EFCE;color:#276221;}
.s-per{background:#FFC7CE;color:#9C0006;}
.s-boz{background:#FFEB9C;color:#9C6500;}
.atag{display:inline-flex;align-items:center;gap:3px;font-size:11px;background:#f0f4fa;color:#555;border-radius:5px;padding:3px 8px;margin:5px 0 7px;font-weight:600;}
.mr{display:flex;align-items:center;gap:5px;font-size:12px;color:#888;margin-top:4px;}
.mr i{font-size:12px;}
.mr-ri{color:#1F4E79!important;font-weight:600;}
.card-ft{display:flex;gap:6px;margin-top:10px;padding-top:9px;border-top:1px solid #eee;flex-wrap:wrap;}
.lnk-ag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 11px;border-radius:20px;text-decoration:none;font-weight:700;border:1.5px solid #BDD7EE;color:#1F4E79;}
.lnk-ag:hover{background:#BDD7EE;}
.lnk-pr{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 11px;border-radius:20px;text-decoration:none;font-weight:700;border:1.5px solid #C6EFCE;color:#276221;}
.lnk-pr:hover{background:#C6EFCE;}
/* editing card */
.card.editing{border:2px solid #2B5F9E;box-shadow:0 4px 20px rgba(43,95,158,.15);padding:16px 18px 16px 22px;}
.card.editing .acc{top:14px;bottom:14px;}
.etit{font-size:11px;font-weight:700;color:#2B5F9E;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:5px;}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.ef{display:flex;flex-direction:column;gap:3px;}
.ef.full{grid-column:1/-1;}
.ef label{font-size:10px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.ef input,.ef select{border:1px solid #dde3ed;border-radius:6px;font-size:12px;padding:6px 8px;background:#fff;color:#1a1a1a;width:100%;}
.ef input:focus,.ef select:focus{outline:2px solid #2B5F9E;}
.ef input.err{outline:2px solid #c00;}
.eact{display:flex;gap:7px;justify-content:flex-end;padding-top:10px;border-top:1px solid #e0e7f0;margin-top:4px;}
.btn-esv{padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer;border:none;border-radius:7px;background:#1E3A5F;color:#fff;}
.btn-esv:hover{background:#2B5F9E;}
.btn-ecn{padding:7px 12px;font-size:12px;cursor:pointer;border:1px solid #dde3ed;border-radius:7px;background:#fff;color:#777;}
/* kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start;}
.kcol{background:#eaf0f8;border-radius:12px;padding:12px;}
.kcol-h{display:flex;align-items:center;gap:6px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #d0dae8;}
.kcol-t{font-size:11px;font-weight:700;color:#1E3A5F;text-transform:uppercase;letter-spacing:.5px;}
.kcol-n{font-size:11px;background:#fff;border:1px solid #d0dae8;border-radius:20px;padding:1px 8px;color:#777;margin-left:auto;font-weight:700;}
.kcard{background:#fff;border:1px solid #e0e7f0;border-radius:8px;padding:10px 12px 10px 15px;position:relative;margin-bottom:8px;}
.kcard:hover{border-color:#a8c4e8;}
.kcard:last-child{margin-bottom:0;}
.kcard .acc{top:9px;bottom:9px;}
.kcard.editing{border:2px solid #2B5F9E;}
.kcard-n{font-size:12px;font-weight:700;color:#1E3A5F;margin-bottom:3px;padding-right:90px;line-height:1.3;}
.kcard-a{font-size:10px;background:#f0f4fa;color:#555;border-radius:4px;padding:2px 6px;display:inline-block;margin-bottom:4px;font-weight:600;}
.km{font-size:11px;color:#999;display:flex;align-items:center;gap:3px;margin-top:3px;}
.km i{font-size:11px;}
.km-ri{color:#1F4E79!important;font-weight:600;}
.kcard-ft{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;}
.klnk-ag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:3px 8px;border-radius:20px;text-decoration:none;font-weight:700;border:1.5px solid #BDD7EE;color:#1F4E79;}
.klnk-ag:hover{background:#BDD7EE;}
.klnk-pr{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:3px 8px;border-radius:20px;text-decoration:none;font-weight:700;border:1.5px solid #C6EFCE;color:#276221;}
.klnk-pr:hover{background:#C6EFCE;}
.kcard-acts{position:absolute;top:7px;right:8px;display:flex;gap:4px;opacity:0;}
.kcard:hover .kcard-acts,.kcard.editing .kcard-acts{opacity:1;}
.kcard.editing .kcard-acts{opacity:0!important;}
.kbtn-m{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid #dde3ed;border-radius:5px;background:#f5f8fc;color:#555;}
.kbtn-m:hover{background:#e8eef8;color:#1E3A5F;}
.kbtn-d{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:1px solid #dde3ed;background:#fff;cursor:pointer;border-radius:5px;color:#ccc;font-size:12px;}
.kbtn-d:hover{background:#fff0f0;color:#c00;}
/* kanban editing */
.kegrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.kef{display:flex;flex-direction:column;gap:2px;}
.kef.full{grid-column:1/-1;}
.kef label{font-size:9px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.kef input,.kef select{border:1px solid #dde3ed;border-radius:5px;font-size:11px;padding:5px 7px;background:#fff;color:#1a1a1a;width:100%;}
.kef input:focus,.kef select:focus{outline:2px solid #2B5F9E;}
.kef input.err{outline:2px solid #c00;}
.keact{display:flex;gap:5px;justify-content:flex-end;padding-top:8px;border-top:1px solid #e0e7f0;}
.kbtn-sv{padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer;border:none;border-radius:6px;background:#1E3A5F;color:#fff;}
.kbtn-sv:hover{background:#2B5F9E;}
.kbtn-cn{padding:5px 9px;font-size:11px;cursor:pointer;border:1px solid #dde3ed;border-radius:6px;background:#fff;color:#777;}
.kempty{text-align:center;padding:16px 8px;color:#bbb;font-size:12px;}
.nores{text-align:center;padding:3rem;color:#888;font-size:14px;}
@media(max-width:700px){
  .metrics{grid-template-columns:repeat(3,1fr);}
  .kanban{grid-template-columns:1fr 1fr;}
  .grid2,.egrid,.kegrid{grid-template-columns:1fr;}
  .full,.ef.full,.kef.full{grid-column:auto;}
}
</style>
</head>
<body>
<div id="app">
<div class="wrap">

<div class="hd">
  <div>
    <div class="logo">kb<b>rand</b> CRM</div>
    <div class="sub">Gestione offerte, agende e proposte commerciali</div>
  </div>
  <div class="hr">
    <span class="stamp" id="stamp"></span>
    <span class="badge b-off" id="cbadge"><i class="ti ti-cloud-off" style="font-size:12px"></i> Locale</span>
  </div>
</div>

<div class="metrics">
  <div class="met"><div class="met-l">Totale</div><div class="met-v c0" id="m0">0</div></div>
  <div class="met"><div class="met-l">Inviate</div><div class="met-v c1" id="m1">0</div></div>
  <div class="met"><div class="met-l">Firmate</div><div class="met-v c2" id="m2">0</div></div>
  <div class="met"><div class="met-l">Perse</div><div class="met-v c3" id="m3">0</div></div>
  <div class="met"><div class="met-l">Da inviare</div><div class="met-v c4" id="m4">0</div></div>
</div>

<div class="tb">
  <div class="srch">
    <i class="ti ti-search"></i>
    <input type="text" id="srch" placeholder="Cerca cliente o attivita..." oninput="go()">
  </div>
  <select class="sort" id="srt" onchange="go()">
    <option value="none">Ordine originale</option>
    <option value="dd">Data invio - recente</option>
    <option value="da">Data invio - meno recente</option>
    <option value="az">Cliente A-Z</option>
    <option value="za">Cliente Z-A</option>
  </select>
  <div class="vtog">
    <button class="vb on" id="vbc" onclick="setV('card')"><i class="ti ti-layout-grid"></i>Schede</button>
    <button class="vb" id="vbk" onclick="setV('kanban')"><i class="ti ti-layout-columns"></i>Kanban</button>
  </div>
  <button class="btn-sec" onclick="togglePanel('att-panel')"><i class="ti ti-tag"></i>Attivita</button>
  <button class="btn-pri" onclick="togglePanel('new-panel')"><i class="ti ti-plus"></i>Nuovo</button>
</div>

<!-- Pannello attivita -->
<div id="att-panel" class="panel" style="display:none">
  <div class="ptit"><i class="ti ti-tag"></i>Attivita proposte</div>
  <div class="chips" id="chips"></div>
  <div class="att-row">
    <input type="text" id="att-inp" placeholder="Nuova attivita..." onkeydown="if(event.key==='Enter')addAtt()">
    <button class="att-add" onclick="addAtt()"><i class="ti ti-plus"></i> Aggiungi</button>
  </div>
</div>

<!-- Pannello nuova offerta -->
<div id="new-panel" class="panel" style="display:none">
  <div class="ptit"><i class="ti ti-file-plus"></i>Nuova offerta</div>
  <div class="grid2">
    <div class="fl"><label>Cliente <span class="req">*</span></label><input type="text" id="n-cli" placeholder="Es. AutoZeta"><div class="err-msg" id="n-err">Campo obbligatorio</div></div>
    <div class="fl"><label>Attivita proposta</label><input type="text" id="n-att" list="att-dl" placeholder="Scegli o digita..."></div>
    <div class="fl"><label>Stato</label><select id="n-sto"><option value="bozza">Da inviare</option><option value="INVIATA">Inviata</option><option value="Firmata">Firmata</option><option value="Persa">Persa</option></select></div>
    <div class="fl"><label>Data invio</label><input type="date" id="n-inv"></div>
    <div class="fl"><label>Data ricontatto</label><input type="date" id="n-ric"></div>
    <div class="fl"><label>Tipo agenda</label><select id="n-cal"><option value="">nessuna</option><option value="Outlook">Outlook 365</option><option value="Google">Google Calendar</option></select></div>
    <div class="fl full"><label>Link proposta</label><input type="text" id="n-lnk" placeholder="https://..."></div>
  </div>
  <div class="pact">
    <button class="btn-can" onclick="closePanel('new-panel')">Annulla</button>
    <button class="btn-save" onclick="saveNew()"><i class="ti ti-check" style="font-size:13px;margin-right:5px;vertical-align:-1px"></i>Salva offerta</button>
  </div>
</div>

<datalist id="att-dl"></datalist>
<div id="area"></div>
</div>
</div>

  {id:"d19",cliente:"Ignarra",              attivita:"LEAPMOTOR",        inviata:null,         stato:"bozza",   ricontatto:null,       tipo_cal:null,     link:null},
  {id:"d20",cliente:"Ignarra",              attivita:"CITROEN BRANDING", inviata:null,         stato:"bozza",   ricontatto:null,       tipo_cal:null,     link:null},
  {id:"d21",cliente:"Denicar",              attivita:"TOPOLINO",         inviata:"2026-06-17", stato:"INVIATA", ricontatto:null,       tipo_cal:null,     link:null},
  {id:"d22",cliente:"Denicar",              attivita:"CITYNEWS",         inviata:"2026-06-17", stato:"INVIATA", ricontatto:null,       tipo_cal:null,     link:null}
];
var DEFACTS = ["ALL IN ONE","WEB","CITYNEWS","DIGITAL","TOPOLINO","LEAPMOTOR","KM0","CITROEN BRANDING"];

/* ─── STATO APP ─── */
var deals = [], acts = [], view = "card", editId = null, db = null, cloud = false;

/* ─── UTILITY ─── */
function uid()   { return "u" + Date.now() + Math.floor(Math.random()*9999); }
function byId(id){ return deals.filter(function(d){ return d.id === id; })[0]; }
function fmt(iso){ if(!iso) return null; var p=iso.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; }
function pd(iso) { return iso ? new Date(iso).getTime() : 0; }
function esc(s)  { if(!s) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function toArr(v){ if(!v) return null; return Array.isArray(v) ? v : Object.values(v); }

/* ─── NORMALIZZA campi da qualsiasi versione precedente ─── */
function norm(d) {
  return {
    id:         d.id || uid(),
    cliente:    d.cliente    || d.c  || "",
    attivita:   d.attivita   || d.a  || d["attivit\u00e0"] || "-",
    stato:      d.stato      || d.s  || "bozza",
    inviata:    d.inviata    || d.inv || d.v  || null,
    ricontatto: d.ricontatto || d.ric || d.r  || null,
    tipo_cal:   d.tipo_cal   || d.cal || d.k  || null,
    link:       d.link       || d.lnk || d.l  || null
  };
}

/* ─── FIREBASE / LOCAL STORAGE ─── */
function start() {
  try {
    firebase.initializeApp(FBCFG);
    db = firebase.database();
    cloud = true;
    document.getElementById("app").style.display = "block";
    setBadge(true);
    db.ref(FBPATH).on("value", function(snap) {
      var data = snap.val() || {};
      var rawDeals = toArr(data.deals) || toArr(data.offerte);
      deals = rawDeals ? rawDeals.map(norm) : DEFDEALS.map(function(d){ return Object.assign({},d); });
      acts  = toArr(data.activities) || toArr(data.acts) || DEFACTS.slice();
      render();
    });
  } catch(e) {
    console.warn("Firebase:", e);
    loadLocal();
  }
}

function loadLocal() {
  try { var r=localStorage.getItem(LSDEALS); var raw=r?JSON.parse(r):null; deals=raw?raw.map(norm):DEFDEALS.map(function(d){return Object.assign({},d);}); } catch(e) { deals=DEFDEALS.map(function(d){return Object.assign({},d);}); }
  try { var r2=localStorage.getItem(LSACTS); acts=r2?JSON.parse(r2):DEFACTS.slice(); } catch(e) { acts=DEFACTS.slice(); }
  cloud = false;
  document.getElementById("app").style.display = "block";
  setBadge(false);
  render();
}

function save() {
  if (cloud && db) {
    db.ref(FBPATH + "/deals").set(deals);
    db.ref(FBPATH + "/activities").set(acts);
  } else {
    try { localStorage.setItem(LSDEALS, JSON.stringify(deals)); } catch(e) {}
    try { localStorage.setItem(LSACTS,  JSON.stringify(acts));  } catch(e) {}
  }
  var t = new Date();
  document.getElementById("stamp").textContent =
    (cloud ? "Sync " : "Salvato ") + ("0"+t.getHours()).slice(-2) + ":" + ("0"+t.getMinutes()).slice(-2);
}

function setBadge(on) {
  var el = document.getElementById("cbadge");
  el.className = "badge " + (on ? "b-on" : "b-off");
  el.innerHTML = on
    ? "<i class='ti ti-cloud' style='font-size:12px'></i> Cloud attivo"
    : "<i class='ti ti-cloud-off' style='font-size:12px'></i> Locale";
}

/* ─── RENDER ─── */
function render() { buildDL(); buildChips(); metrics(); go(); }

/* ─── DATALIST ─── */
function buildDL() {
  var dl = document.getElementById("att-dl");
  if (!dl) return;
  dl.innerHTML = acts.map(function(a){ return "<option value='" + esc(a) + "'>"; }).join("");
}

/* ─── CHIPS ATTIVITA ─── */
function buildChips() {
  var el = document.getElementById("chips");
  if (!el) return;
  if (!acts.length) { el.innerHTML = "<span style='font-size:12px;color:#bbb'>Nessuna attivita</span>"; return; }
  el.innerHTML = acts.map(function(a, i) {
    return "<span class='chip'>" + esc(a) +
      "<button class='chip-del' data-del-att='" + i + "'><i class='ti ti-x'></i></button></span>";
  }).join("");
}

function addAtt() {
  var inp = document.getElementById("att-inp");
  var v = inp.value.trim().toUpperCase();
  if (!v || acts.indexOf(v) >= 0) { inp.value = ""; return; }
  acts.push(v); inp.value = "";
  save(); buildDL(); buildChips();
}

function autoAtt(v) {
  var u = v.trim().toUpperCase();
  if (u && acts.indexOf(u) < 0) { acts.push(u); buildDL(); }
}

/* ─── PANNELLI ─── */
function togglePanel(id) {
  var el = document.getElementById(id);
  var other = id === "new-panel" ? "att-panel" : "new-panel";
  document.getElementById(other).style.display = "none";
  if (el.style.display === "none") {
    el.style.display = "block";
    if (id === "new-panel") {
      ["n-cli","n-att","n-inv","n-ric","n-lnk"].forEach(function(x){ document.getElementById(x).value = ""; });
      document.getElementById("n-sto").value = "bozza";
      document.getElementById("n-cal").value = "";
      document.getElementById("n-err").style.display = "none";
      setTimeout(function(){ document.getElementById("n-cli").focus(); }, 50);
    }
    if (id === "att-panel") {
      buildChips();
      setTimeout(function(){ document.getElementById("att-inp").focus(); }, 50);
    }
  } else {
    el.style.display = "none";
  }
}
function closePanel(id) { document.getElementById(id).style.display = "none"; }

/* ─── NUOVA OFFERTA ─── */
function saveNew() {
  var cli = document.getElementById("n-cli").value.trim();
  if (!cli) { document.getElementById("n-err").style.display = "block"; return; }
  var att = document.getElementById("n-att").value.trim();
  autoAtt(att);
  deals.push({
    id:         uid(),
    cliente:    cli,
    attivita:   att || "-",
    stato:      document.getElementById("n-sto").value,
    inviata:    document.getElementById("n-inv").value || null,
    ricontatto: document.getElementById("n-ric").value || null,
    tipo_cal:   document.getElementById("n-cal").value || null,
    link:       document.getElementById("n-lnk").value.trim() || null
  });
  save(); metrics(); closePanel("new-panel");
  if (!cloud) go();
}

/* ─── EDIT ─── */
function startEdit(id) { editId = id; go(); }
function cancelEdit()  { editId = null; go(); }

function saveEdit(id) {
  var d = byId(id); if (!d) return;
  var inp = document.getElementById("ei-cli-" + id); if (!inp) return;
  var cli = inp.value.trim();
  if (!cli) { inp.classList.add("err"); inp.focus(); return; }
  inp.classList.remove("err");
  var att = document.getElementById("ei-att-" + id).value.trim();
  autoAtt(att);
  d.cliente    = cli;
  d.attivita   = att || "-";
  d.stato      = document.getElementById("ei-sto-" + id).value;
  d.inviata    = document.getElementById("ei-inv-" + id).value || null;
  d.ricontatto = document.getElementById("ei-ric-" + id).value || null;
  d.tipo_cal   = document.getElementById("ei-cal-" + id).value || null;
  d.link       = document.getElementById("ei-lnk-" + id).value.trim() || null;
  editId = null;
  save(); metrics();
  if (!cloud) go();
}

/* ─── ELIMINA ─── */
function delDeal(id) {
  if (!confirm("Eliminare questa offerta?")) return;
  deals = deals.filter(function(d){ return d.id !== id; });
  save(); metrics();
  if (!cloud) go();
}

/* ─── URL AGENDA ─── */
function agendaUrl(d) {
  if (!d.ricontatto) return null;
  var s = encodeURIComponent("Ricontatto " + d.cliente + " - " + d.attivita);
  var b = encodeURIComponent("Offerta: " + d.attivita + " | Cliente: " + d.cliente);
  if (d.tipo_cal === "Google") {
    var dt = d.ricontatto.replace(/-/g, "");
    return "https://calendar.google.com/calendar/render?action=TEMPLATE&text=" + s + "&dates=" + dt + "T090000/" + dt + "T100000&details=" + b;
  }
  return "https://outlook.office.com/calendar/action/compose?subject=" + s + "&startdt=" + d.ricontatto + "T09:00:00&enddt=" + d.ricontatto + "T10:00:00&body=" + b;
}

/* ─── HTML HELPERS ─── */
function stBadge(s) {
  var m = {INVIATA:["s-inv","ti-send","Inviata"], Firmata:["s-fir","ti-circle-check","Firmata"], Persa:["s-per","ti-circle-x","Persa"], bozza:["s-boz","ti-clock","Da inviare"]};
  var r = m[s] || m.bozza;
  return "<span class='stbadge " + r[0] + "'><i class='ti " + r[1] + "' style='font-size:10px;vertical-align:-1px;margin-right:2px'></i>" + r[2] + "</span>";
}
function statoOpts(cur) {
  return [["bozza","Da inviare"],["INVIATA","Inviata"],["Firmata","Firmata"],["Persa","Persa"]].map(function(o){
    return "<option value='" + o[0] + "'" + (cur===o[0]?" selected":"") + ">" + o[1] + "</option>";
  }).join("");
}
function calOpts(cur, compact) {
  var o = compact
    ? [["","--"],["Outlook","Outlook"],["Google","Google"]]
    : [["","nessuna"],["Outlook","Outlook 365"],["Google","Google Calendar"]];
  return o.map(function(x){ return "<option value='" + x[0] + "'" + (cur===x[0]?" selected":"") + ">" + x[1] + "</option>"; }).join("");
}

/* ─── CARD VIEW HTML ─── */
function cardViewHtml(d) {
  var au = agendaUrl(d);
  var agLbl = d.tipo_cal === "Google" ? "Google Cal" : "Outlook";
  var html = "";
  html += "<div class='card' id='card-" + d.id + "'>";
  html += "<div class='acc' style='background:" + COLORS[d.stato] + "'></div>";
  html += "<div class='card-h'>";
  html += "<div class='card-n'>" + esc(d.cliente) + "</div>";
  html += "<div class='card-a'>" + stBadge(d.stato);
  html += " <button class='btn-mod' data-action='edit' data-id='" + d.id + "'><i class='ti ti-edit' style='font-size:12px'></i>Modifica</button>";
  html += " <button class='btn-del' data-action='del' data-id='" + d.id + "' title='Elimina'><i class='ti ti-trash'></i></button>";
  html += "</div></div>";
  html += "<div class='atag'><i class='ti ti-tag' style='font-size:10px'></i>" + esc(d.attivita) + "</div>";
  html += "<div class='mr'>" + (d.inviata ? "<i class='ti ti-calendar-event'></i>Inviata il " + fmt(d.inviata) : "<i class='ti ti-calendar-off'></i><span style='color:#ccc'>Data invio non impostata</span>") + "</div>";
  if (d.ricontatto) html += "<div class='mr mr-ri'><i class='ti ti-bell'></i>Ricontatto " + fmt(d.ricontatto) + "</div>";
  if (au || d.link) {
    html += "<div class='card-ft'>";
    if (au) html += "<a class='lnk-ag' href='" + au + "' target='_blank' rel='noopener'><i class='ti ti-calendar-event' style='font-size:11px'></i>" + agLbl + "</a>";
    if (d.link) html += "<a class='lnk-pr' href='" + esc(d.link) + "' target='_blank' rel='noopener'><i class='ti ti-external-link' style='font-size:11px'></i>Apri proposta</a>";
    html += "</div>";
  }
  html += "</div>";
  return html;
}

function cardEditHtml(d) {
  var id = d.id;
  var html = "";
  html += "<div class='card editing' id='card-" + id + "'>";
  html += "<div class='acc' style='background:" + COLORS[d.stato] + "'></div>";
  html += "<div class='etit'><i class='ti ti-edit'></i> Modifica offerta</div>";
  html += "<div class='egrid'>";
  html += "<div class='ef'><label>Cliente *</label><input id='ei-cli-" + id + "' value='" + esc(d.cliente) + "'></div>";
  html += "<div class='ef'><label>Attivita</label><input id='ei-att-" + id + "' value='" + esc(d.attivita) + "' list='att-dl'></div>";
  html += "<div class='ef'><label>Stato</label><select id='ei-sto-" + id + "'>" + statoOpts(d.stato) + "</select></div>";
  html += "<div class='ef'><label>Tipo agenda</label><select id='ei-cal-" + id + "'>" + calOpts(d.tipo_cal, false) + "</select></div>";
  html += "<div class='ef'><label>Data invio</label><input type='date' id='ei-inv-" + id + "' value='" + (d.inviata||"") + "'></div>";
  html += "<div class='ef'><label>Data ricontatto</label><input type='date' id='ei-ric-" + id + "' value='" + (d.ricontatto||"") + "'></div>";
  html += "<div class='ef full'><label>Link proposta</label><input id='ei-lnk-" + id + "' value='" + esc(d.link||"") + "' placeholder='https://...'></div>";
  html += "</div>";
  html += "<div class='eact'>";
  html += "<button class='btn-ecn' data-action='cancel'>Annulla</button>";
  html += "<button class='btn-esv' data-action='save' data-id='" + id + "'><i class='ti ti-check' style='font-size:12px;margin-right:4px;vertical-align:-1px'></i>Salva</button>";
  html += "</div></div>";
  return html;
}

/* ─── KANBAN HTML ─── */
function kcardViewHtml(d) {
  var au = agendaUrl(d);
  var agLbl = d.tipo_cal === "Google" ? "Google" : "Outlook";
  var html = "";
  html += "<div class='kcard' id='kcard-" + d.id + "'>";
  html += "<div class='acc' style='background:" + COLORS[d.stato] + "'></div>";
  html += "<div class='kcard-acts'>";
  html += "<button class='kbtn-m' data-action='edit' data-id='" + d.id + "'><i class='ti ti-edit' style='font-size:10px'></i>Modifica</button>";
  html += "<button class='kbtn-d' data-action='del' data-id='" + d.id + "' title='Elimina'><i class='ti ti-trash'></i></button>";
  html += "</div>";
  html += "<div class='kcard-n'>" + esc(d.cliente) + "</div>";
  html += "<div class='kcard-a'>" + esc(d.attivita) + "</div>";
  if (d.inviata) html += "<div class='km'><i class='ti ti-calendar-event'></i>" + fmt(d.inviata) + "</div>";
  if (d.ricontatto) html += "<div class='km km-ri'><i class='ti ti-bell'></i>" + fmt(d.ricontatto) + "</div>";
  if (au || d.link) {
    html += "<div class='kcard-ft'>";
    if (au) html += "<a class='klnk-ag' href='" + au + "' target='_blank' rel='noopener'><i class='ti ti-calendar-event'></i>" + agLbl + "</a>";
    if (d.link) html += "<a class='klnk-pr' href='" + esc(d.link) + "' target='_blank' rel='noopener'><i class='ti ti-external-link'></i>Proposta</a>";
    html += "</div>";
  }
  html += "</div>";
  return html;
}

function kcardEditHtml(d) {
  var id = d.id;
  var html = "";
  html += "<div class='kcard editing' id='kcard-" + id + "'>";
  html += "<div class='acc' style='background:" + COLORS[d.stato] + "'></div>";
  html += "<div style='font-size:9px;font-weight:700;color:#2B5F9E;text-transform:uppercase;margin-bottom:8px'>Modifica</div>";
  html += "<div class='kegrid'>";
  html += "<div class='kef full'><label>Cliente *</label><input id='ei-cli-" + id + "' value='" + esc(d.cliente) + "'></div>";
  html += "<div class='kef full'><label>Attivita</label><input id='ei-att-" + id + "' value='" + esc(d.attivita) + "' list='att-dl'></div>";
  html += "<div class='kef'><label>Stato</label><select id='ei-sto-" + id + "'>" + statoOpts(d.stato) + "</select></div>";
  html += "<div class='kef'><label>Agenda</label><select id='ei-cal-" + id + "'>" + calOpts(d.tipo_cal, true) + "</select></div>";
  html += "<div class='kef'><label>Data invio</label><input type='date' id='ei-inv-" + id + "' value='" + (d.inviata||"") + "'></div>";
  html += "<div class='kef'><label>Ricontatto</label><input type='date' id='ei-ric-" + id + "' value='" + (d.ricontatto||"") + "'></div>";
  html += "<div class='kef full'><label>Link proposta</label><input id='ei-lnk-" + id + "' value='" + esc(d.link||"") + "' placeholder='https://...'></div>";
  html += "</div>";
  html += "<div class='keact'>";
  html += "<button class='kbtn-cn' data-action='cancel'>Annulla</button>";
  html += "<button class='kbtn-sv' data-action='save' data-id='" + id + "'>Salva</button>";
  html += "</div></div>";
  return html;
}

/* ─── FILTRO / ORDINAMENTO ─── */
function filtered() {
  var q = document.getElementById("srch").value.trim().toLowerCase();
  var s = document.getElementById("srt").value;
  var L = q ? deals.filter(function(d){ return d.cliente.toLowerCase().indexOf(q) >= 0 || d.attivita.toLowerCase().indexOf(q) >= 0; }) : deals.slice();
  if (s === "dd") L.sort(function(a,b){ return pd(b.inviata)-pd(a.inviata); });
  else if (s === "da") L.sort(function(a,b){ if(!a.inviata&&!b.inviata) return 0; if(!a.inviata) return 1; if(!b.inviata) return -1; return pd(a.inviata)-pd(b.inviata); });
  else if (s === "az") L.sort(function(a,b){ return a.cliente.localeCompare(b.cliente); });
  else if (s === "za") L.sort(function(a,b){ return b.cliente.localeCompare(a.cliente); });
  return L;
}

/* ─── METRICHE ─── */
function metrics() {
  document.getElementById("m0").textContent = deals.length;
  document.getElementById("m1").textContent = deals.filter(function(d){ return d.stato==="INVIATA"; }).length;
  document.getElementById("m2").textContent = deals.filter(function(d){ return d.stato==="Firmata"; }).length;
  document.getElementById("m3").textContent = deals.filter(function(d){ return d.stato==="Persa"; }).length;
  document.getElementById("m4").textContent = deals.filter(function(d){ return d.stato==="bozza"; }).length;
}

/* ─── RENDER PRINCIPALE ─── */
function go() {
  var L = filtered();
  var area = document.getElementById("area");
  if (!L.length) {
    area.innerHTML = "<div class='nores'><i class='ti ti-search-off' style='font-size:28px;display:block;margin:0 auto 10px;color:#ccc'></i>Nessun risultato.</div>";
    return;
  }
  if (view === "card") {
    area.innerHTML = "<div class='cgrid'>" + L.map(function(d){ return editId===d.id ? cardEditHtml(d) : cardViewHtml(d); }).join("") + "</div>";
  } else {
    var COLS = [
      {s:"bozza",   l:"Da inviare", ic:"ti-clock"},
      {s:"INVIATA", l:"Inviate",    ic:"ti-send"},
      {s:"Firmata", l:"Firmate",    ic:"ti-circle-check"},
      {s:"Persa",   l:"Perse",      ic:"ti-circle-x"}
    ];
    area.innerHTML = "<div class='kanban'>" + COLS.map(function(col) {
      var items = L.filter(function(d){ return d.stato === col.s; });
      return "<div class='kcol'>" +
        "<div class='kcol-h'><i class='ti " + col.ic + "' style='font-size:13px;color:" + COLORS[col.s] + "'></i>" +
        "<span class='kcol-t'>" + col.l + "</span><span class='kcol-n'>" + items.length + "</span></div>" +
        (items.length ? items.map(function(d){ return editId===d.id ? kcardEditHtml(d) : kcardViewHtml(d); }).join("") : "<div class='kempty'>Nessuna offerta</div>") +
        "</div>";
    }).join("") + "</div>";
  }
  /* focus su editing */
  if (editId) {
    var el = document.getElementById("card-"+editId) || document.getElementById("kcard-"+editId);
    if (el) {
      el.scrollIntoView({behavior:"smooth", block:"nearest"});
      var fi = el.querySelector("input[id^='ei-cli']");
      if (fi) setTimeout(function(){ fi.focus(); }, 60);
    }
  }
}

function setV(v) {
  view = v; editId = null;
  document.getElementById("vbc").classList.toggle("on", v==="card");
  document.getElementById("vbk").classList.toggle("on", v==="kanban");
  go();
}

/* ─── EVENT DELEGATION ─── */
document.addEventListener("click", function(e) {
  /* chip delete */
  var chipBtn = e.target.closest ? e.target.closest("[data-del-att]") : null;
  if (chipBtn) {
    var i = parseInt(chipBtn.getAttribute("data-del-att"), 10);
    acts.splice(i, 1);
    save(); buildDL(); buildChips();
    return;
  }
  /* azioni card/kanban */
  var btn = e.target.closest ? e.target.closest("[data-action]") : null;
  if (!btn) return;
  var action = btn.getAttribute("data-action");
  var id     = btn.getAttribute("data-id");
  if (action === "edit")   startEdit(id);
  if (action === "del")    delDeal(id);
  if (action === "save")   saveEdit(id);
  if (action === "cancel") cancelEdit();
});

/* ─── AVVIO ─── */
start();
</script>
